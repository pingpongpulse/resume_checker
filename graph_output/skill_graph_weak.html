                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"borderWidth": 3, "color": {"background": "#7F77DD", "border": "#FF4D4D"}, "font": {"color": "white"}, "id": "ROLE", "label": "Backend Engineer\n34/100", "shape": "star", "size": 60, "title": "\ud83c\udfaf Backend Engineer \u2014 Fit Score: 34/100"}, {"borderWidth": 2, "color": {"background": "#CC0000", "border": "#00FFAA"}, "font": {"color": "white"}, "id": "matched_python", "label": "python", "shape": "dot", "size": 30, "title": "\u2705 python \u2014 Candidate has this"}, {"borderWidth": 2, "color": {"background": "#CC0000", "border": "#FF4D4D"}, "font": {"color": "white"}, "id": "missing_fastapi", "label": "fastapi", "shape": "dot", "size": 22, "title": "\u274c fastapi \u2014 Gap to fill"}, {"borderWidth": 2, "color": {"background": "#CC0000", "border": "#FF4D4D"}, "font": {"color": "white"}, "id": "missing_postgresql", "label": "postgresql", "shape": "dot", "size": 22, "title": "\u274c postgresql \u2014 Gap to fill"}, {"borderWidth": 2, "color": {"background": "#CC0000", "border": "#FF4D4D"}, "font": {"color": "white"}, "id": "missing_docker", "label": "docker", "shape": "dot", "size": 22, "title": "\u274c docker \u2014 Gap to fill"}, {"borderWidth": 2, "color": {"background": "#CC0000", "border": "#FF4D4D"}, "font": {"color": "white"}, "id": "missing_kubernetes", "label": "kubernetes", "shape": "dot", "size": 22, "title": "\u274c kubernetes \u2014 Gap to fill"}, {"borderWidth": 2, "color": {"background": "#0066FF", "border": "#4DA6FF"}, "font": {"color": "white"}, "id": "bonus_html", "label": "html", "shape": "dot", "size": 18, "title": "\u2b50 html \u2014 Extra value"}, {"borderWidth": 2, "color": {"background": "#0066FF", "border": "#4DA6FF"}, "font": {"color": "white"}, "id": "bonus_css", "label": "css", "shape": "dot", "size": 18, "title": "\u2b50 css \u2014 Extra value"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#FF4D4D", "dashes": false, "from": "ROLE", "to": "matched_python", "width": 1}, {"arrows": "to", "color": "#FF4D4D", "dashes": true, "from": "ROLE", "to": "missing_fastapi", "width": 1}, {"arrows": "to", "color": "#FF4D4D", "dashes": true, "from": "ROLE", "to": "missing_postgresql", "width": 1}, {"arrows": "to", "color": "#FF4D4D", "dashes": true, "from": "ROLE", "to": "missing_docker", "width": 1}, {"arrows": "to", "color": "#FF4D4D", "dashes": true, "from": "ROLE", "to": "missing_kubernetes", "width": 1}, {"arrows": "to", "color": "#4DA6FF", "dashes": false, "from": "ROLE", "to": "bonus_html", "width": 1}, {"arrows": "to", "color": "#4DA6FF", "dashes": false, "from": "ROLE", "to": "bonus_css", "width": 1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;

                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "forceAtlas2Based": {"gravitationalConstant": -26, "centralGravity": 0.3, "springLength": 200, "springConstant": 0.05, "dissuadeHubs": true, "overlap": 0.5}, "maxVelocity": 50, "stabilization": {"enabled": true, "iterations": 200, "fit": true}, "timestep": 0.35, "adaptiveTimestep": true}, "interaction": {"hover": true, "navigationButtons": true, "keyboard": true, "zoomView": true}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
